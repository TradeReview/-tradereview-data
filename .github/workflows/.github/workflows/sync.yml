name: Sync Myfxbook Data

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login and fetch Myfxbook data
        run: |
          SESSION=$(curl -s "https://www.myfxbook.com/api/login.json?email=${{ secrets.MYFXBOOK_EMAIL }}&password=${{ secrets.MYFXBOOK_PASSWORD }}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['session'])")

          curl -s "https://www.myfxbook.com/api/get-my-accounts.json?session=$SESSION" > all_accounts.json

          python3 - <<'EOF'
          import json

          with open('all_accounts.json') as f:
              data = json.load(f)

          accounts = data.get('accounts', [])

          oro = next((a for a in accounts if str(a.get('id')) == '11945489'), None)
          btc = next((a for a in accounts if str(a.get('id')) == '11726357'), None)

          import os
          os.makedirs('data', exist_ok=True)

          if oro:
              with open('data/oro.json', 'w') as f:
                  json.dump(oro, f)

          if btc:
              with open('data/btc.json', 'w') as f:
                  json.dump(btc, f)
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git diff --staged --quiet || git commit -m "sync myfxbook data"
          git push
